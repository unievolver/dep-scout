name: Publish to MCP Registry

on:
  push:
    tags: ["v*"]

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Build Linux binary
        run: cargo build --release --locked

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install mcpb CLI
        run: pnpm add -g @anthropic-ai/mcpb

      - name: Pack MCPB bundle
        run: |
          mkdir -p mcpb/server
          cp target/release/dep-scout mcpb/server/dep-scout
          cd mcpb
          mcpb pack
          VERSION="${GITHUB_REF#refs/tags/v}"
          mv mcpb.mcpb "dep-scout-${VERSION}.mcpb"
          sha256sum "dep-scout-${VERSION}.mcpb"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mcpb/dep-scout-*.mcpb
          generate_release_notes: true

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Set version in server.json
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          SHA=$(sha256sum mcpb/dep-scout-v${VERSION}.mcpb | awk '{print $1}')
          jq --arg v "$VERSION" --arg sha "$SHA" \
            '.version = $v | .packages[0].identifier = "https://github.com/unievolver/dep-scout/releases/download/v\($v)/dep-scout-\($v).mcpb" | .packages[0].fileSha256 = $sha' \
            server.json > server.tmp && mv server.tmp server.json

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish
